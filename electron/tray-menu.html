<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --accent: #3b82f6;
    --bg: #060a10;
    --border: rgba(255,255,255,0.07);
    --text: #c8cdd8;
    --text-dim: #546280;
    --font: 'Rajdhani', 'Segoe UI', system-ui, sans-serif;
    --mono: 'Share Tech Mono', 'Courier New', monospace;
  }
  html, body { width: 190px; background: transparent; overflow: hidden; user-select: none; -webkit-user-select: none; font-family: var(--font); }
  .menu {
    background: var(--bg);
    border: 1px solid var(--accent);
    clip-path: polygon(0 0, calc(100% - 9px) 0, 100% 9px, 100% 100%, 9px 100%, 0 calc(100% - 9px));
    box-shadow: 0 0 0 1px rgba(0,0,0,0.9), 0 12px 40px rgba(0,0,0,0.8), 0 0 24px color-mix(in srgb, var(--accent) 18%, transparent);
    position: relative; overflow: hidden;
  }
  .menu::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none; z-index: 0;
  }
  .menu::after {
    content: ''; position: absolute; top: 0; right: 0; width: 1px; height: 100%;
    background: linear-gradient(to bottom, transparent, color-mix(in srgb, var(--accent) 40%, transparent), transparent);
    pointer-events: none; z-index: 0;
  }
  .corner { position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 9px 9px 0; border-color: transparent var(--accent) transparent transparent; z-index: 3; opacity: 0.7; }
  .header { padding: 10px 12px 9px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 9px; position: relative; z-index: 1; }
  .logo-box {
    width: 24px; height: 24px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 20%, transparent), color-mix(in srgb, var(--accent) 6%, transparent));
    border: 1px solid color-mix(in srgb, var(--accent) 60%, transparent);
    clip-path: polygon(5px 0%, 100% 0%, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0% 100%, 0% 5px);
    box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .logo-box svg { width: 13px; height: 13px; color: var(--accent); }
  .logo-text-wrap { display: flex; flex-direction: column; gap: 1px; }
  .logo-title { font-family: var(--font); font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #e8eaf0; line-height: 1; }
  .logo-sub { font-family: var(--mono); font-size: 7px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; line-height: 1; }
  .running-badge { display: none; align-items: center; gap: 5px; margin: 0 12px 7px; padding: 4px 8px; background: color-mix(in srgb, var(--accent) 10%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent); clip-path: polygon(4px 0%, 100% 0%, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0% 100%, 0% 4px); position: relative; z-index: 1; }
  .running-badge.on { display: flex; }
  .pulse { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.65)} }
  .running-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
  .nav { padding: 3px 0; position: relative; z-index: 1; }
  .item { display: flex; align-items: center; gap: 9px; padding: 6px 12px; cursor: pointer; color: var(--text-dim); font-family: var(--font); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; transition: background 0.1s, color 0.1s; position: relative; border-left: 2px solid transparent; }
  .item:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); color: #d8dce8; border-left-color: var(--accent); }
  .item:hover .ico { color: var(--accent); }
  .item:active { background: color-mix(in srgb, var(--accent) 16%, transparent); }
  .ico { width: 13px; height: 13px; flex-shrink: 0; color: var(--text-dim); transition: color 0.1s; }
  .ico svg { width: 100%; height: 100%; display: block; }
  .sep { height: 1px; background: var(--border); margin: 3px 0; position: relative; z-index: 1; }
  .exit { color: rgba(239,68,68,0.6); }
  .exit:hover { background: rgba(239,68,68,0.09) !important; color: #ef4444 !important; border-left-color: #ef4444 !important; }
  .exit:hover .ico { color: #ef4444 !important; }
</style>
</head>
<body>
<div class="menu">
  <div class="corner"></div>
  <div class="header">
    <div class="logo-box" id="logoBox">
      <!-- Logo will be injected here by script -->
    </div>
    <div class="logo-text-wrap">
      <div class="logo-title">Launchpad</div>
      <div class="logo-sub">Mission Control</div>
    </div>
  </div>
  <div class="running-badge" id="runBadge">
    <div class="pulse"></div>
    <div class="running-label">Game Running</div>
  </div>
  <div class="nav" id="nav"></div>
  <div class="sep"></div>
  <div class="item exit" id="exitBtn">
    <span class="ico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </span>
    Exit
  </div>
</div>
<script>
  // Load logo.svg dynamically with accent color
  const logoBoxEl = document.getElementById('logoBox')
  const params = new URLSearchParams(window.location.search)
  const accent = params.get('accent') || '#3b82f6'
  const gameRunning = params.get('gameRunning') === '1'
  
  fetch('../public/logo.svg')
    .then(res => res.text())
    .then(svg => {
      // Replace accent color with the current accent
      const updated = svg.replace(/#c07cff/gi, accent)
      // Create a wrapper that scales it to 13px
      logoBoxEl.innerHTML = `<svg viewBox="0 0 580.032 580.032" style="width: 13px; height: 13px;">${updated.match(/<svg[^>]*>(.*)<\/svg>/is)[1]}</svg>`
    })
    .catch(err => {
      console.error('Failed to load logo:', err)
      // Fallback to gamepad icon
      logoBoxEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 00-3.978 3.59l-1.37 12.18A3 3 0 004.32 24h15.36a3 3 0 002.99-3.22l-1.37-12.18A4 4 0 0017.32 5z"/></svg>`
    })
  
  document.documentElement.style.setProperty('--accent', accent)

  if (gameRunning) document.getElementById('runBadge').classList.add('on')

  const PAGES = [
    { label: 'Home',        page: 'home',        d: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>' },
    { label: 'Library',     page: 'library',     d: '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>' },
    { label: 'Platforms',   page: 'platforms',   d: '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>' },
    { label: 'Collections', page: 'collections', d: '<path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>' },
    { label: 'Statistics',  page: 'stats',       d: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>' },
    { label: 'Friends',     page: 'friends',     d: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
    { label: 'Settings',    page: 'settings',    d: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>' },
  ]

  const nav = document.getElementById('nav')
  PAGES.forEach(({ label, page, d }) => {
    const el = document.createElement('div')
    el.className = 'item'
    el.innerHTML = '<span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + d + '</svg></span>' + label
    el.addEventListener('click', () => window.electronTrayAPI.navigate(page))
    nav.appendChild(el)
  })

  document.getElementById('exitBtn').addEventListener('click', () => window.electronTrayAPI.exit())
  window.addEventListener('blur', () => window.electronTrayAPI.close())
  window.addEventListener('contextmenu', e => e.preventDefault())
</script>
</body>
</html>
